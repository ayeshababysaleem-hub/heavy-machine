<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payment</title>
  <link rel="stylesheet" href="/style.css">
  <!-- Stripe removed: using local providers only -->
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/dashboard.html">Dashboard</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:1000px;margin:0 auto">
      <div class="page-payment" style="display:grid;grid-template-columns:1fr;gap:28px;align-items:start">
        <aside class="card" style="padding:20px;">
          <h2 style="margin-top:0;margin-bottom:8px">Send Payment Details</h2>
          <div id="summary" style="margin-bottom:12px"></div>
          <div id="providerInfo" style="margin-bottom:12px;color:var(--muted)"></div>
          <div id="proofFields" style="margin-bottom:12px">
            <!-- Payment provider is derived from the booking's paymentMethod -->
            <label style="display:block;margin-bottom:6px">Owner Account Title<div id="ownerAccountTitle" style="display:block;width:100%;padding:8px;margin-top:6px;background:rgba(255,255,255,0.03);border-radius:8px;color:var(--muted)"></div></label>
            <label style="display:block;margin-bottom:6px">Owner Account Number<div id="ownerAccountNumber" style="display:block;width:100%;padding:8px;margin-top:6px;background:rgba(255,255,255,0.03);border-radius:8px;color:var(--muted)"></div></label>
            <!-- Admin / Platform account (shown when available) -->
            <label style="display:block;margin-bottom:6px">Admin Account Title<div id="adminAccountTitle" style="display:block;width:100%;padding:8px;margin-top:6px;background:rgba(255,255,255,0.03);border-radius:8px;color:var(--muted)"></div></label>
            <label style="display:block;margin-bottom:6px">Admin Account Number<div id="adminAccountNumber" style="display:block;width:100%;padding:8px;margin-top:6px;background:rgba(255,255,255,0.03);border-radius:8px;color:var(--muted)"></div></label>
          </div>
          <div style="display:flex;gap:12px;align-items:center">
            <button id="payBtn" disabled style="background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;padding:12px 20px;border-radius:10px;border:0;cursor:pointer;display:inline-block">Pay</button>
            <button id="cancelBtn" style="padding:12px 20px;border-radius:10px;border:0;background:transparent;border:1px solid rgba(255,255,255,0.06);color:#e6eef8;cursor:pointer">Cancel</button>
          </div>
          <div id="result" style="margin-top:12px"></div>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>
  </div>

  <script>
    // Lightweight alert modal and helpers
    function createModals(){
      if (document.getElementById('alertModal')) return;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `
        <div id="alertModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:none;align-items:center;justify-content:center">
          <div style="background:#0b1220;border-radius:12px;padding:20px;max-width:480px;width:90%">
            <h3 id="alertTitle" style="margin:0 0 8px;color:#e6eef8">Message</h3>
            <p id="alertMessage" style="color:#94a3b8;margin:0 0 12px"></p>
            <div style="text-align:right"><button id="alertOk" style="padding:8px 14px;border-radius:8px;background:linear-gradient(90deg,#49a6ff,#2d8ff6);border:0;color:#fff">OK</button></div>
          </div>
        </div>`;
      document.body.appendChild(wrapper);
    }
    function showAlert(title, message){
      return new Promise(resolve => {
        createModals();
        const modal = document.getElementById('alertModal');
        document.getElementById('alertTitle').textContent = title;
        document.getElementById('alertMessage').textContent = message;
        modal.style.display = 'flex';
        const ok = document.getElementById('alertOk');
        const handler = ()=>{ modal.style.display = 'none'; ok.removeEventListener('click', handler); resolve(); };
        ok.addEventListener('click', handler);
      });
    }

    function showConfirm(title, message){
      return new Promise(resolve => {
        createModals();
        // create confirm modal only once
        if (!document.getElementById('confirmModal')){
          const wrapper = document.createElement('div');
          wrapper.innerHTML = `
            <div id="confirmModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:none;align-items:center;justify-content:center">
              <div style="background:#0b1220;border-radius:12px;padding:20px;max-width:480px;width:90%">
                <h3 id="confirmTitle" style="margin:0 0 8px;color:#e6eef8">Confirm</h3>
                <p id="confirmMessage" style="color:#94a3b8;margin:0 0 12px"></p>
                <div style="text-align:right"><button id="confirmCancel" style="padding:8px 14px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:#e6eef8;margin-right:8px">Cancel</button><button id="confirmOk" style="padding:8px 14px;border-radius:8px;background:linear-gradient(90deg,#49a6ff,#2d8ff6);border:0;color:#fff">Confirm</button></div>
              </div>
            </div>`;
          document.body.appendChild(wrapper);
        }

        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        modal.style.display = 'flex';
        const ok = document.getElementById('confirmOk');
        const cancel = document.getElementById('confirmCancel');
        const okHandler = ()=>{ modal.style.display='none'; ok.removeEventListener('click', okHandler); cancel.removeEventListener('click', cancelHandler); resolve(true); };
        const cancelHandler = ()=>{ modal.style.display='none'; ok.removeEventListener('click', okHandler); cancel.removeEventListener('click', cancelHandler); resolve(false); };
        ok.addEventListener('click', okHandler);
        cancel.addEventListener('click', cancelHandler);
      });
    }

    // global logging for unexpected errors
    window.addEventListener('error', e => console.error('Page error:', e.error || e));
    window.addEventListener('unhandledrejection', e => console.error('Unhandled rejection:', e.reason || e));

    // Main flow
    window.addEventListener('DOMContentLoaded', function(){
      (async function main(){
        const summaryEl = document.getElementById('summary');
        const payBtn = document.getElementById('payBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // basic handlers
        cancelBtn && cancelBtn.addEventListener('click', ()=>{ sessionStorage.removeItem('pendingBooking'); location = '/booking.html'; });

        const raw = sessionStorage.getItem('pendingBooking');
        if (!raw){
          summaryEl.innerHTML = '<p>No pending booking found. Start from the <a href="/booking.html">booking page</a>.</p>';
          payBtn && (payBtn.style.display = 'none');
          return;
        }

        let booking = null;
        try{ booking = JSON.parse(raw); }catch(e){ summaryEl.innerHTML = '<p>Saved booking data is corrupted. Please start a new booking <a href="/booking.html">here</a>.</p>'; payBtn && (payBtn.style.display = 'none'); return; }

        // fetch machine data
        try{
          const r = await fetch('/api/machines/'+encodeURIComponent(booking.machineId));
          if (!r.ok) throw new Error('Failed to fetch machine: ' + r.status);
          const m = await r.json();
          const price = Number(m.price) || 0; const days = Number(booking.durationDays) || 1;
          const formatPKR = n => '₨ ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          summaryEl.innerHTML = `
            <div style="display:flex;gap:12px;align-items:flex-start">
              ${m.image ? `<img src="${m.image}" style="width:84px;height:60px;object-fit:cover;border-radius:6px"/>` : ''}
              <div><p style="margin:0"><strong>${m.name || booking.machineId}</strong></p>
                <p style="margin:6px 0 0;color:var(--muted)"><strong>Start:</strong> ${booking.startDate}</p>
                <p style="margin:6px 0 0;color:var(--muted)"><strong>Days:</strong> ${days}</p></div>
            </div>
            <div style="margin-top:12px"><p style="margin:4px 0"><strong>Total:</strong> ${formatPKR(price * days)}</p></div>`;

          // enable pay button for local providers
          const method = booking.paymentMethod || 'jazzcash';
          if (method !== 'jazzcash' && method !== 'easypaisa'){ summaryEl.innerHTML += '<p style="color:#ffb4b4">Unsupported payment method</p>'; payBtn && (payBtn.style.display='none'); return; }
          if (payBtn) { payBtn.disabled = false; payBtn.textContent = 'Pay'; }

          // fetch owner public info to show account title and numbers
          let ownerAccountTitle = null;
          let ownerJazz = null;
          let ownerEasy = null;
          const bookingProvider = booking.paymentMethod || 'jazzcash';
          try{
            if (m && m.ownerId){
              const or = await fetch('/api/users/'+encodeURIComponent(m.ownerId));
              if (or.ok){ const ou = await or.json(); ownerAccountTitle = ou.accountTitle || (ou.name || ''); ownerJazz = ou.jazzcashAccount || null; ownerEasy = ou.easypaisaAccount || null; }
            }
          }catch(e){ console.warn('Failed to fetch owner info', e); }

          // fetch admin account (me if admin, otherwise public admin account) as fallback
          let adminAccountTitle = null;
          let adminJazz = null;
          let adminEasy = null;
          try{
            const token = localStorage.getItem('token');
            const meResp = await fetch('/api/me', token ? { headers: { Authorization: 'Bearer ' + token } } : {});
            if (meResp.ok){
              const me = await meResp.json();
              if (me && me.role === 'Admin'){
                adminAccountTitle = me.accountTitle || (me.name || null);
                adminJazz = me.jazzcashAccount || null;
                adminEasy = me.easypaisaAccount || null;
              }
            }
            if (!adminAccountTitle){
              const adm = await fetch('/api/admin/account');
              if (adm.ok){ const a = await adm.json(); adminAccountTitle = a.accountTitle || (a.name || null); adminJazz = a.jazzcashAccount || null; adminEasy = a.easypaisaAccount || null; }
            }
          }catch(e){ console.warn('Failed to fetch admin info', e); }

          // decide which account to show: prefer owner for selected provider, otherwise fall back to admin
          const ownerAccountTitleEl = document.getElementById('ownerAccountTitle');
          const ownerAccountNumberEl = document.getElementById('ownerAccountNumber');
          const adminTitleEl = document.getElementById('adminAccountTitle');
          const adminNumberEl = document.getElementById('adminAccountNumber');

          const ownerProviderNumber = (bookingProvider === 'jazzcash') ? ownerJazz : ownerEasy;
          const adminProviderNumber = (bookingProvider === 'jazzcash') ? adminJazz : adminEasy;

          // Always populate owner fields (if available) and admin fields (if available)
          if (ownerAccountTitleEl) ownerAccountTitleEl.textContent = ownerAccountTitle || (m.ownerId || 'Owner');
          // show owner provider number; if missing, fall back to admin provider number so customers always have an account to pay to
          if (ownerAccountNumberEl) ownerAccountNumberEl.textContent = ownerProviderNumber || adminProviderNumber || 'Not provided';

          // Populate admin fields separately so customers can always see admin account details
          if (adminTitleEl) adminTitleEl.style.display = 'block';
          if (adminNumberEl) adminNumberEl.style.display = 'block';
          if (adminTitleEl) adminTitleEl.textContent = adminAccountTitle || 'Admin';
          // show admin provider number; if missing, fall back to owner provider number
          if (adminNumberEl) adminNumberEl.textContent = adminProviderNumber || ownerProviderNumber || 'Not provided';

          // single-stage click handler: confirm -> create booking + local payment -> redirect to receipt
          payBtn && payBtn.addEventListener('click', async function onPay(){
            try{
              const confirmed = await showConfirm('Confirm Payment', 'Please confirm you want to proceed with payment for this booking.');
              if (!confirmed) return;
              payBtn.disabled = true; payBtn.textContent = 'Processing...';
              const token = localStorage.getItem('token');
              const headers = { 'content-type': 'application/json' }; if (token) headers.authorization = 'Bearer ' + token;
                const createRes = await fetch('/api/bookings', { method: 'POST', headers, body: JSON.stringify(booking) });
                if (!createRes.ok) {
                  // try to show a friendly message when possible
                  let msg = '';
                  try{ const js = await createRes.json(); msg = js && (js.error || js.message) ? (js.error || js.message) : JSON.stringify(js); }catch(e){ msg = await createRes.text().catch(()=>createRes.statusText || 'Failed to create booking'); }
                  if (createRes.status === 409) {
                    await showAlert('Booking Failed', msg || 'Machine already booked for requested dates');
                  } else {
                    await showAlert('Error', msg || ('Failed to create booking: ' + createRes.status));
                  }
                  payBtn.disabled=false; payBtn.textContent='Pay';
                  return;
                }
              const createJson = await createRes.json(); const createdBooking = createJson.booking || createJson; const createdBookingId = createdBooking.id || createJson.id || booking.id;
              const selectedProvider = booking.paymentMethod || method;
              const r = await fetch('/api/payments/local-create', { method: 'POST', headers, body: JSON.stringify({ bookingId: createdBookingId, provider: selectedProvider }) });
              if (!r.ok){ const t = await r.text().catch(()=>''); await showAlert('Error','Failed to create local payment: '+r.status+' '+t); payBtn.disabled=false; payBtn.textContent='Pay'; return; }
              const js = await r.json();
              // persist minimal state and redirect to receipt
              sessionStorage.setItem('lastBooking', JSON.stringify(createdBooking));
              sessionStorage.removeItem('pendingBooking');
              sessionStorage.setItem('createdBookingId', createdBookingId);
              sessionStorage.setItem('createdLocalPaymentId', js.localPaymentId || '');
              await showAlert('Payment Initiated','Booking created and payment initiated. Redirecting to receipt...');
              location = '/payment-receipt.html';
            }catch(err){ console.error('Pay flow failed', err); await showAlert('Error','Network error during payment'); payBtn.disabled=false; payBtn.textContent='Pay'; }
          });

        }catch(err){ console.error('Prepare payment failed', err); summaryEl.textContent = 'Error preparing payment: '+(err && err.message ? err.message : String(err)); if (payBtn) payBtn.style.display='none'; }
      })();

      // fallback handlers to ensure buttons are clickable for debugging
      window.addEventListener('load', ()=>{
        const payBtn = document.getElementById('payBtn'); const cancelBtn = document.getElementById('cancelBtn');
        if (cancelBtn) cancelBtn.addEventListener('click', ()=>{ try{ console.log('Fallback cancel clicked'); sessionStorage.removeItem('pendingBooking'); location='/booking.html'; }catch(e){ console.error(e); } });
        if (payBtn) payBtn.addEventListener('click', ()=>{ try{ console.log('Fallback pay clicked'); }catch(e){ console.error(e); } });
      });
    });
    </script>
</body>
</html>
