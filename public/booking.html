<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <style>
    /* style for booked dates */
    .booked-date a { background:#f3f4f6 !important; color:#9ca3af !important; }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/register.html">Register</a>
          <a href="/login.html">Login</a>
          <a href="/dashboard.html">Machinery</a>
          <a href="/contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:720px;margin:0 auto">
      <div class="card">
        <h2>Booking Details</h2>
        <p id="machineInfo" style="color:var(--muted)"></p>
        <form id="bookingForm">
          <input name="machineId" type="hidden" />
          <label>Your full name
            <input name="name" type="text" required />
          </label>
          <label>Your email
            <input name="email" type="email" required />
          </label>
          <label>CNIC / ID number
            <input name="cnic" type="text" placeholder="e.g., 12345-6789012-3" required />
            <small style="color:#94a3b8;display:block;margin-top:4px">Format: XXXXX-XXXXXXX-X (13 digits total). Last digit: Odd=Male, Even=Female</small>
          </label>
          <label>Phone number
            <input name="phone" type="tel" placeholder="e.g., 03001234567" required />
            <small style="color:#94a3b8;display:block;margin-top:4px">Valid formats: 03XX XXXXXXX or 923XX XXXXXX or 3XX XXXXXX</small>
          </label>
          <label>Address
            <input name="address" type="text" required />
          </label>
          <label>Start date (YYYY-MM-DD)
            <input id="startDate" name="startDate" type="text" required autocomplete="off" />
          </label>
          <label>Duration (days)
            <input name="durationDays" type="number" min="1" required />
          </label>
          <label>Security Deposit (₨)
            <input name="securityDeposit" type="number" min="0" step="0.01" placeholder="0" value="200000" />
          </label>
          <label>Customer account (for refund/account number)
            <input name="customerAccount" type="text" placeholder="e.g., 03001234567 or Account #" />
          </label>
          <!-- Booking location removed per admin request -->
          <div style="margin-top:12px"><button type="submit">Proceed to Payment</button></div>
        </form>
        <div id="result" style="margin-top:12px"></div>
      </div>
    </main>

    <footer class="site-footer">
          <script>
            // Initialize jQuery UI datepicker and set minDate to today
          document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const minDateStr = `${yyyy}-${mm}-${dd}`;

            // helper to check if a date (Date) is within any disabled range
            function isDateDisabled(date){
              if (!window._disabledRanges || !Array.isArray(window._disabledRanges)) return false;
              const ymd = date.toISOString().slice(0,10);
              for (const r of window._disabledRanges){
                if (ymd >= r.from && ymd <= r.to) return true;
              }
              return false;
            }

            const el = document.getElementById('startDate');
            if (!el) return;

            // initialize datepicker
            $(el).datepicker({
              dateFormat: 'yy-mm-dd',
              minDate: 0,
              showButtonPanel: true,
              beforeShowDay: function(date){
                const disabled = isDateDisabled(date);
                return [!disabled, disabled ? 'booked-date' : '', disabled ? 'Booked' : ''];
              },
              onSelect: function(dateText){
                const dur = document.querySelector('[name="durationDays"]').value;
                const mid = document.querySelector('[name="machineId"]').value;
                if (mid && dateText && dur){ checkAvailability(mid, dateText, dur).then(r=>{ const infoEl = document.getElementById('result'); infoEl.textContent = r.ok ? '' : 'Machine is already booked for the selected dates'; }); }
              }
            });
          });
          </script>
      <div class="container">© 2026 My Project</div>
    </footer>

    <!-- Modal for alerts -->
    <div id="alertModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
      <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
        <h3 id="alertTitle" style="margin:0 0 12px 0;color:#e6eef8">Message</h3>
        <p id="alertMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Message</p>
        <div style="display:flex;justify-content:flex-end">
          <button id="alertOk" style="padding:10px 24px;border-radius:8px;border:0;background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;cursor:pointer;font-weight:600">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Styled alert modal
    function showAlert(title, message){
      return new Promise((resolve)=>{
        const modal = document.getElementById('alertModal');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const okBtn = document.getElementById('alertOk');
        titleEl.textContent = title;
        msgEl.textContent = message;
        modal.style.display = 'flex';
        const handle = ()=>{ modal.style.display='none'; okBtn.removeEventListener('click', handle); resolve(); };
        okBtn.addEventListener('click', handle);
      });
    }
    // prefill machine id from query and user info if available
    const params = new URLSearchParams(location.search);
    const machineId = params.get('machineId');
    if (machineId) document.querySelector('[name=machineId]').value = machineId;

    // show machine info if machineId present
    async function loadMachineInfo(){
      const mid = document.querySelector('[name=machineId]').value;
      const infoEl = document.getElementById('machineInfo');
      if (!mid){ infoEl.textContent = ''; return }
      try{
        const r = await fetch('/api/machines/' + encodeURIComponent(mid));
        if (!r.ok){ infoEl.textContent = ''; return }
        const m = await r.json();
        const price = (typeof m.price !== 'undefined' && m.price !== null) ? Number(m.price) : 0;
        infoEl.innerHTML = `<strong>${m.name || 'Unnamed machine'}</strong> — ${m.model || ''} — ₨ ${price.toFixed(2)}`;
        // update flatpickr disabled ranges for this machine
        try{ await updateDisabledDatesForMachine(mid); }catch(e){ console.error('updateDisabledDatesForMachine failed', e); }
      }catch(e){ console.error('load machine info failed', e); infoEl.textContent = ''; }
    }
    loadMachineInfo();

    // Check availability for selected machine/start/duration against non-rejected bookings
    async function checkAvailability(mid, startDate, durationDays){
      if (!mid || !startDate || !durationDays) return { ok: true };
      try{
        const q = '/api/bookings?machineId=' + encodeURIComponent(mid);
        const r = await fetch(q);
        if (!r.ok) return { ok: true };
        const js = await r.json();
        const list = js.data || [];
        const s = new Date(startDate);
        const days = Math.max(1, parseInt(durationDays, 10) || 1);
        const e = new Date(s);
        e.setDate(e.getDate() + days - 1);
        for (const b of list){
          const status = (b.status || 'pending');
          if (status === 'rejected') continue; // ignore rejected bookings
          const bs = new Date(b.startDate);
          const be = new Date(b.endDate);
          if (!(e < bs || s > be)){
            return { ok: false, booking: b };
          }
        }
        return { ok: true };
      }catch(e){ console.error('availability check failed', e); return { ok: true } }
    }

    // fetch bookings and set flatpickr disable ranges (ignore rejected bookings)
    async function updateDisabledDatesForMachine(mid){
      if (!mid) return;
      try{
        const r = await fetch('/api/bookings?machineId=' + encodeURIComponent(mid));
        if (!r.ok) return;
        const js = await r.json();
        const list = js.data || [];
        const ranges = [];
        for (const b of list){
          const status = (b.status || 'pending');
          if (status === 'rejected') continue;
          if (!b.startDate || !b.endDate) continue;
          ranges.push({ from: b.startDate.slice(0,10), to: b.endDate.slice(0,10) });
        }
        window._disabledRanges = ranges;
        // refresh datepicker UI if present
        try{ if (window.jQuery && $('#startDate').data('datepicker')){ $('#startDate').datepicker('refresh'); } }catch(e){ /* ignore */ }
      }catch(e){ console.error('failed to update disabled dates', e); }
    }

    // live-validate availability when startDate or duration changes
    (function attachAvailabilityHandlers(){
      const form = document.getElementById('bookingForm');
      if (!form) return;
      const startInput = form.elements['startDate'];
      const durInput = form.elements['durationDays'];
      const infoEl = document.getElementById('result');
      async function validate(){
        const mid = document.querySelector('[name=machineId]').value;
        const sd = startInput && startInput.value;
        const dd = durInput && durInput.value;
        if (!mid || !sd || !dd){ infoEl.textContent = ''; return }
        infoEl.textContent = 'Checking availability...';
        const res = await checkAvailability(mid, sd, dd);
        if (!res.ok){
          infoEl.textContent = 'Machine is already booked for the selected dates';
        } else {
          infoEl.textContent = '';
        }
      }
      if (startInput) startInput.addEventListener('change', validate);
      if (durInput) durInput.addEventListener('input', validate);
    })();

    async function tryPrefillUser(){
      const token = localStorage.getItem('token');
      if (!token) return;
      try{
        const r = await fetch('/api/me', { headers: { Authorization: 'Bearer '+token } });
        if (!r.ok) return;
        const u = await r.json();
        if (u.name) document.querySelector('[name=name]').value = u.name;
        if (u.email) document.querySelector('[name=email]').value = u.email;
      }catch(e){ console.error('prefill user failed', e) }
    }
    tryPrefillUser();

    document.getElementById('bookingForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const f = e.target;
      
      // Validate CNIC format (13 digits)
      const cnic = f.cnic.value.trim();
      const cnicDigits = cnic.replace(/\D/g, '');
      if (cnicDigits.length !== 13) {
        await showAlert('Invalid CNIC Number', 'CNIC must be exactly 13 digits. Example: 12345-6789012-3');
        return;
      }
      
      // Check last digit for gender (optional validation)
      const lastDigit = parseInt(cnicDigits[12]);
      const gender = lastDigit % 2 === 1 ? 'Male' : 'Female';
      console.log('CNIC Gender:', gender);
      
      // Validate phone number
      const phone = f.phone.value.trim();
      const phoneDigits = phone.replace(/\D/g, '');
      const validPak = (phoneDigits.length === 11 && phoneDigits.startsWith('03')) ||
                       (phoneDigits.length === 12 && phoneDigits.startsWith('923') && phoneDigits[2] === '3') ||
                       (phoneDigits.length === 10 && phoneDigits.startsWith('3'));
      
      if (!validPak) {
        await showAlert('Invalid Phone Number', 'Valid Pakistan phone formats:\n• 03XX XXXXXXX (11 digits)\n• 923X XXXXXXX (12 digits)\n• 3XX XXXXXX (10 digits)');
        return;
      }

      // check availability first
      const avail = await checkAvailability(f.machineId.value, f.startDate.value, f.durationDays.value);
      if (!avail.ok){ await showAlert('Unavailable', 'Machine is already booked for the selected dates'); return }

      const body = {
        machineId: f.machineId.value,
        startDate: f.startDate.value,
        durationDays: Number(f.durationDays.value),
        securityDeposit: Number(f.securityDeposit && f.securityDeposit.value) || 0,
        name: f.name.value.trim(),
        email: f.email.value.trim(),
        cnic: f.cnic.value.trim(),
        phone: f.phone.value.trim(),
        address: f.address.value.trim()
      };
      // include customerAccount if provided
      if (typeof f.customerAccount !== 'undefined') body.customerAccount = (f.customerAccount.value || '').trim() || null;
      // enrich booking with machine details (name/model/price) and store, then redirect
      (async function(){
        try{
          if (body.machineId){
            try{
              const r = await fetch('/api/machines/' + encodeURIComponent(body.machineId));
              if (r.ok){ const m = await r.json(); body.machineName = m.name || ''; body.machineModel = m.model || ''; body.machinePrice = typeof m.price !== 'undefined' && m.price !== null ? Number(m.price) : null; }
            }catch(e){ /* ignore machine fetch errors, proceed with what we have */ }
          }
          sessionStorage.setItem('pendingBooking', JSON.stringify(body));
          localStorage.setItem('pendingBooking', JSON.stringify(body));
          location = '/payment-details.html';
        }catch(err){ console.error('failed to store pending booking', err); const resEl = document.getElementById('result'); resEl.textContent = 'Unable to proceed to payment'; }
      })();
    });
  </script>
</body>
</html>
