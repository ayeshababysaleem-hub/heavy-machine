<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Edit Machine</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/dashboard.html">Dashboard</a>
          <a href="/login.html" id="navLogin">Login</a>
          <a href="#" id="navLogout" style="display:none;">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:720px;margin:0 auto">
      <div class="card">
        <h2>Edit Machine</h2>
        <form id="editForm" enctype="multipart/form-data">
          <label>Name</label>
          <input name="name" required style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Type</label>
          <input name="type" required style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Price (per day) (PKR)</label>
          <input name="price" type="number" step="0.01" style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Model</label>
          <input name="model" style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Location</label>
          <input name="location" style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Image (file upload)</label>
          <input name="imageFile" type="file" accept="image/*" style="display:block;width:100%;padding:10px;margin-top:8px" />
          <small style="display:block;color:var(--muted);margin-top:6px">Or provide an image URL below (used only if no file selected)</small>
          <label>Image URL</label>
          <input name="image" style="display:block;width:100%;padding:10px;margin-top:8px" />
          <label>Description</label>
          <textarea name="description" style="display:block;width:100%;padding:10px;margin-top:8px;min-height:120px"></textarea>
          <div style="margin-top:12px"><button type="submit">Save changes</button> <button type="button" id="cancelBtn">Cancel</button></div>
        </form>
        <div id="result" style="margin-top:12px"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>
  </div>

  <script>
    // Styled alert modal (returns a Promise)
    function createModals(){
      if (document.getElementById('alertModal')) return;
      const w = document.createElement('div');
      w.innerHTML = `
        <div id="confirmModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
          <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
            <h3 id="confirmTitle" style="margin:0 0 12px 0;color:#e6eef8">Confirm</h3>
            <p id="confirmMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Are you sure?</p>
            <div style="display:flex;gap:12px;justify-content:flex-end">
              <button id="confirmCancel" style="padding:10px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#e6eef8;cursor:pointer;font-weight:600;transition:all 0.2s">Cancel</button>
              <button id="confirmOk" style="padding:10px 18px;border-radius:8px;border:0;background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff;cursor:pointer;font-weight:600;transition:all 0.2s">OK</button>
            </div>
          </div>
        </div>
        <div id="alertModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
          <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:480px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
            <h3 id="alertTitle" style="margin:0 0 12px 0;color:#e6eef8">Message</h3>
            <p id="alertMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Operation complete.</p>
            <div style="display:flex;justify-content:flex-end">
              <button id="alertOk" style="padding:10px 24px;border-radius:8px;border:0;background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;cursor:pointer;font-weight:600;transition:all 0.2s">OK</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(w);
    }

    function showAlert(title, message){
      return new Promise((resolve)=>{
        if (!document.getElementById('alertModal')) createModals();
        const modal = document.getElementById('alertModal');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const okBtn = document.getElementById('alertOk');
        titleEl.textContent = title || 'Message';
        msgEl.textContent = message || '';
        modal.style.display = 'flex';
        const handleOk = () => { cleanup(); resolve(); };
        const cleanup = () => { modal.style.display = 'none'; okBtn.removeEventListener('click', handleOk); document.removeEventListener('keydown', handleEscape); };
        const handleEscape = (e) => { if (e.key === 'Escape') handleOk(); };
        okBtn.addEventListener('click', handleOk);
        document.addEventListener('keydown', handleEscape);
      });
    }

    const params = new URLSearchParams(location.search);
    const machineId = params.get('machineId');
    if (!machineId) { document.getElementById('result').textContent = 'Missing machine id'; }

    async function load(){
      try{
        const res = await fetch('/api/machines/' + encodeURIComponent(machineId));
        if (!res.ok) return;
        const m = await res.json();
        const f = document.getElementById('editForm');
        f.name.value = m.name || '';
        f.type.value = m.type || '';
        f.price.value = typeof m.price !== 'undefined' && m.price !== null ? m.price : '';
        f.model.value = m.model || '';
        f.location.value = m.location || '';
        f.image.value = m.image || '';
        f.description.value = m.description || '';
      }catch(e){ console.error(e); document.getElementById('result').textContent = 'Network error'; }
    }

    document.getElementById('editForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const f = e.target;
      const token = localStorage.getItem('token'); if (!token) return showAlert('Not authorized. Please login.');
      // build FormData to allow file upload (multer on server handles `image` field)
      const fd = new FormData();
      fd.append('name', f.name.value.trim());
      fd.append('type', f.type.value.trim());
      if (f.price.value !== '') fd.append('price', f.price.value);
      fd.append('model', f.model.value.trim());
      fd.append('location', f.location.value.trim());
      fd.append('description', f.description.value.trim());
      // file takes precedence
      const file = f.imageFile && f.imageFile.files && f.imageFile.files[0];
      if (file) fd.append('image', file);
      else if (f.image && f.image.value) fd.append('image', f.image.value.trim());
      try{
        const r = await fetch('/api/machines/' + encodeURIComponent(machineId), { method: 'PUT', headers: { 'authorization':'Bearer '+token }, body: fd });
        if (!r.ok){ const t = await r.text().catch(()=>''); return showAlert('Error','Failed to update: '+r.status+' '+t); }
        await showAlert('Success','Machine updated');
        location = '/dashboard.html';
      }catch(err){ console.error(err); await showAlert('Error','Network error'); }
    });

    document.getElementById('cancelBtn').addEventListener('click', ()=> location = '/dashboard.html');
    // show logout if token
    if (localStorage.getItem('token')) document.getElementById('navLogout').style.display='inline-block';
    document.getElementById('navLogout').addEventListener('click', ()=>{ localStorage.removeItem('token'); location='/login.html' });

    load();
  </script>
</body>
</html>
