name: CI Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: heavy_machine
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "SELECT 1" && break
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Configure DB env
        run: |
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_PORT=3306" >> $GITHUB_ENV
          echo "DB_USER=root" >> $GITHUB_ENV
          echo "DB_PASSWORD=password" >> $GITHUB_ENV
          echo "DB_NAME=heavy_machine" >> $GITHUB_ENV

      - name: Run migrations
        run: npx knex migrate:latest --knexfile knexfile.js

      - name: Seed DB
        run: node scripts/seed-db.js --wipe

      - name: Start server
        run: nohup node server.js > server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -sS http://localhost:3000/api/machines && break
            sleep 1
          done

      - name: Run smoke test
        run: node scripts/smoke_test.js
