<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payment Receipt</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      body { background: white; margin: 0; padding: 15px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }
      .site-header, .site-footer, #doneBtn, #pdfBtn { display: none !important; }
      .site { background: white; }
      .container { max-width: 800px; margin: 0 auto; }
      .card { box-shadow: none; border: 2px solid #000; page-break-inside: avoid; padding: 15px !important; }
      h2 { font-size: 20px; text-align: center; margin: 0 0 12px 0; border-bottom: 3px solid #0f766e; padding-bottom: 6px; color: #0f766e !important; }
      h3 { margin: 8px 0 4px 0; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      #receipt { color: #000; page-break-inside: avoid; }
      #receipt p { margin: 2px 0; font-size: 13px; line-height: 1.4; }
      #receipt strong { font-weight: 600; }
      .receipt-section { margin-top: 8px; padding-top: 6px; border-top: 1px solid #ccc; }
      .receipt-row { display: flex; justify-content: space-between; margin: 2px 0; font-size: 13px; }
      .receipt-label { font-weight: 600; flex: 1; }
      .receipt-value { text-align: right; flex: 0 0 auto; }
      .receipt-total { border-top: 2px solid #000; padding-top: 4px; font-size: 14px; font-weight: 700; margin-top: 6px; }
      code { background: #f5f5f5; padding: 1px 4px; font-size: 11px; }
    }
    h2 { color: #0f766e !important; font-weight: 700; }
    #pdfBtn { background: linear-gradient(90deg, #10b981, #059669); color: #fff; padding: 10px 16px; border-radius: 8px; border: 0; cursor: pointer; margin-right: 8px; font-weight: 600; }
    #pdfBtn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
  </style>
</head>
<body>
  <div class="site">
    <header class="site-header"><div class="container"><div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div></div></header>
    <main class="container" style="padding:40px 20px;max-width:900px;margin:0 auto">
      <div class="card">
        <h2 style="margin-top:0">Payment Receipt</h2>
        <div id="receipt">Loading...</div>
        <div style="margin-top:16px"><button id="pdfBtn" style="background:linear-gradient(90deg,#10b981,#059669);color:#fff;padding:10px 16px;border-radius:8px;border:0;cursor:pointer;margin-right:8px">Download PDF</button><button id="doneBtn" style="background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;padding:10px 16px;border-radius:8px;border:0;cursor:pointer">Done</button>
        <a href="/dashboard.html" style="margin-left:12px;color:var(--muted)">Dashboard</a></div>
      </div>
    </main>
    <footer class="site-footer"><div class="container">© 2026 My Project</div></footer>
  </div>

  <script>
    function formatPKR(n){ return '₨ ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    (async function(){
      const receipt = document.getElementById('receipt');
      const doneBtn = document.getElementById('doneBtn');
      let last = null;
      try{ last = JSON.parse(sessionStorage.getItem('lastBooking') || '{}') }catch(e){}
      let pending = null;
      try{ pending = JSON.parse(sessionStorage.getItem('lastPendingBooking') || '{}') }catch(e){}
      if (!last || !last.id){ receipt.innerHTML = '<p>No receipt available.</p><p>Please check your bookings in the dashboard.</p>'; return }
      // try to fetch machine details for nicer receipt
      let machine = null;
      try{
        if (pending && pending.machineName){ machine = { name: pending.machineName, model: pending.machineModel, price: pending.machinePrice } }
        if (!machine && last.machineId){ const r = await fetch('/api/machines/' + encodeURIComponent(last.machineId)); if (r.ok) machine = await r.json(); }
      }catch(e){ console.warn('Failed to fetch machine for receipt', e) }

      const days = Number(last.durationDays) || (pending && Number(pending.durationDays) || 1);
      const price = (pending && typeof pending.machinePrice !== 'undefined' && pending.machinePrice !== null) ? Number(pending.machinePrice) : (machine && Number(machine.price) ? Number(machine.price) : 0);
      const total = price * days;
      const machineName = machine ? (machine.name + (machine.model ? ' — '+machine.model : '')) : (pending && pending.machineName) || last.machineId;
      const paymentMethod = pending && pending.paymentMethod ? pending.paymentMethod : (last.paymentMethod || 'card');

      receipt.innerHTML = `
        <div class="receipt-section">
          <h3>Booking Information</h3>
          <p><strong>Booking ID:</strong> <code>${last.id}</code></p>
          <p><strong>Date:</strong> ${last.createdAt ? new Date(last.createdAt).toLocaleDateString() : new Date().toLocaleDateString()}</p>
        </div>

        <div class="receipt-section">
          <h3>Customer</h3>
          <p><strong>Name:</strong> ${last.name || pending && pending.name || '—'}</p>
          <p><strong>Email:</strong> ${last.email || pending && pending.email || '—'}</p>
          <p><strong>Phone:</strong> ${last.phone || '—'} | <strong>Address:</strong> ${last.address || '—'}</p>
        </div>

        <div class="receipt-section">
          <h3>Machine</h3>
          <p><strong>Name:</strong> ${machineName}</p>
        </div>

        <div class="receipt-section">
          <h3>Rental Details</h3>
          <p><strong>Start:</strong> ${last.startDate} | <strong>End:</strong> ${last.endDate}</p>
          <div class="receipt-row" style="margin-top:3px">
            <span class="receipt-label">Duration:</span>
            <span class="receipt-value">${days} day(s)</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-label">Price/Day:</span>
            <span class="receipt-value">${formatPKR(price)}</span>
          </div>
          <div class="receipt-row receipt-total">
            <span class="receipt-label">Total Paid:</span>
            <span class="receipt-value">${formatPKR(total)}</span>
          </div>
        </div>

        <div class="receipt-section">
          <h3>Payment</h3>
          <p><strong>Method:</strong> ${paymentMethod.charAt(0).toUpperCase() + paymentMethod.slice(1)} | <strong>Status:</strong> <span style="color:green">Completed</span></p>
        </div>

        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #ccc;font-size:11px;color:#666;line-height:1.5">
          <p style="margin:2px 0">Thank you for your business. This is your official receipt.</p>
        </div>
      `;

      const pdfBtn = document.getElementById('pdfBtn');
      pdfBtn.addEventListener('click', ()=>{
        window.print();
      });

      doneBtn.addEventListener('click', ()=>{
        // clear temporary receipt storage
        try{ sessionStorage.removeItem('lastBooking'); }catch(e){}
        try{ sessionStorage.removeItem('lastPendingBooking'); }catch(e){}
        location = '/dashboard.html';
      });
    })();
  </script>
</body>
</html>
