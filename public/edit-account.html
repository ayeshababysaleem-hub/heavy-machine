<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Edit Account</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/dashboard.html">Dashboard</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:720px;margin:0 auto">
      <div class="card">
        <h2 style="margin-top:0">Account Settings</h2>
        <p>Provide your account title and a payment account for JazzCash or EasyPaisa.</p>
        <form id="accountForm" style="margin-top:16px;display:grid;gap:10px">
          <label>Account Title <input id="accountTitle" name="accountTitle" placeholder="e.g. My Company" disabled /></label>
          <fieldset style="border:1px solid #ddd;padding:10px">
            <legend style="padding:0 6px">JazzCash</legend>
            <label>JazzCash Account Number <input id="jazzcashAccount" name="jazzcashAccount" placeholder="e.g. 03001234567" disabled /></label>
          </fieldset>
          <fieldset style="border:1px solid #ddd;padding:10px">
            <legend style="padding:0 6px">EasyPaisa</legend>
            <label>EasyPaisa Account Number <input id="easypaisaAccount" name="easypaisaAccount" placeholder="e.g. 03001234567" disabled /></label>
          </fieldset>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button type="button" id="editBtn" style="padding:8px 14px">Edit</button>
            <button type="button" id="saveBtn" style="padding:8px 14px;display:none">Save</button>
            <button type="button" id="cancelBtn" style="padding:8px 14px;display:none">Cancel</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>
  </div>

  <script>
    // Modal helpers (same style used across admin pages)
    function createModals(){
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `
      <!-- Confirmation Modal -->
      <div id="confirmModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
        <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
          <h3 id="confirmTitle" style="margin:0 0 12px 0;color:#e6eef8">Confirm Action</h3>
          <p id="confirmMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Are you sure?</p>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button id="confirmCancel" style="padding:10px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#e6eef8;cursor:pointer;font-weight:600;transition:all 0.2s">Cancel</button>
            <button id="confirmOk" style="padding:10px 18px;border-radius:8px;border:0;background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff;cursor:pointer;font-weight:600;transition:all 0.2s">OK</button>
          </div>
        </div>
      </div>
      <!-- Alert Modal -->
      <div id="alertModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
        <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
          <h3 id="alertTitle" style="margin:0 0 12px 0;color:#e6eef8">Message</h3>
          <p id="alertMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Operation complete.</p>
          <div style="display:flex;justify-content:flex-end">
            <button id="alertOk" style="padding:10px 24px;border-radius:8px;border:0;background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;cursor:pointer;font-weight:600;transition:all 0.2s">OK</button>
          </div>
        </div>
      </div>
      `;
      document.body.appendChild(wrapper);
    }

    function showAlert(title, message) {
      return new Promise((resolve) => {
        if (!document.getElementById('alertModal')) createModals();
        const modal = document.getElementById('alertModal');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const okBtn = document.getElementById('alertOk');
        titleEl.textContent = title;
        msgEl.textContent = message;
        modal.style.display = 'flex';
        const handleOk = () => { cleanup(); resolve(); };
        const cleanup = () => { modal.style.display = 'none'; okBtn.removeEventListener('click', handleOk); document.removeEventListener('keydown', handleEscape); };
        const handleEscape = (e) => { if (e.key === 'Escape') handleOk(); };
        okBtn.addEventListener('click', handleOk);
        document.addEventListener('keydown', handleEscape);
      });
    }

    // Edit mode handling
    function setEditMode(editing){
      document.getElementById('accountTitle').disabled = !editing;
      document.getElementById('jazzcashAccount').disabled = !editing;
      document.getElementById('easypaisaAccount').disabled = !editing;
      document.getElementById('editBtn').style.display = editing ? 'none' : 'inline-block';
      document.getElementById('saveBtn').style.display = editing ? 'inline-block' : 'none';
      document.getElementById('cancelBtn').style.display = editing ? 'inline-block' : 'none';
    }

    // Load current user account fields and populate the form
    async function loadAccount(){
      const token = localStorage.getItem('token');
      if (!token) { location = '/login.html'; return; }
      try{
        const res = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) { await showAlert('Error','Failed to load account'); return; }
        const u = await res.json();
        document.getElementById('accountTitle').value = u.accountTitle || '';
        document.getElementById('jazzcashAccount').value = u.jazzcashAccount || '';
        document.getElementById('easypaisaAccount').value = u.easypaisaAccount || '';
        // ensure we're in view mode
        setEditMode(false);
      }catch(e){ console.error(e); await showAlert('Error','Network error'); }
    }

    document.getElementById('editBtn').addEventListener('click', ()=>{ setEditMode(true); });

    document.getElementById('cancelBtn').addEventListener('click', async ()=>{
      // revert to last-saved values
      await loadAccount();
      setEditMode(false);
    });

    // Save the account details. Require account title and at least one provider account.
    document.getElementById('saveBtn').addEventListener('click', async ()=>{
      const token = localStorage.getItem('token'); if (!token) return await showAlert('Error','Not authorized');
      const accountTitle = document.getElementById('accountTitle').value.trim();
      const jazzcashAccount = document.getElementById('jazzcashAccount').value.trim();
      const easypaisaAccount = document.getElementById('easypaisaAccount').value.trim();
      if (!accountTitle) return await showAlert('Error','Account title is required');
      if (!jazzcashAccount && !easypaisaAccount) return await showAlert('Error','Enter at least one payment account (JazzCash or EasyPaisa)');
      const payload = { accountTitle, jazzcashAccount: jazzcashAccount || null, easypaisaAccount: easypaisaAccount || null };
      try{
        const r = await fetch('/api/me', { method: 'PUT', headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token }, body: JSON.stringify(payload) });
        if (!r.ok){ const t = await r.text().catch(()=>''); return await showAlert('Error','Save failed: '+r.status+' '+t); }
        await showAlert('Success','Saved');
        // show view mode and refresh values
        await loadAccount();
        setEditMode(false);
      }catch(e){ console.error(e); await showAlert('Error','Network error'); }
    });

    // initial load
    loadAccount();
  </script>
