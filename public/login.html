<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/register.html">Register</a>
          <a href="/contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container" style="display:flex;justify-content:center;align-items:flex-start;padding-top:40px;">
      <div class="card">
        <h2>Login</h2>
        <form id="login">
          <label>Email<input name="email" type="email" required /></label>
          <label>Password<input name="password" type="password" required /></label>
          <button type="submit">Login</button>
        </form>
        <div id="msg"></div>
        <p style="margin-top:12px">New? <a href="/register.html">Register</a></p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>
  </div>
  <script>
    document.getElementById('login').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = Object.fromEntries(fd.entries());
      const msg = document.getElementById('msg');
      // basic client-side validation
      if (!data.email || !data.password) { msg.textContent = 'Please enter email and password.'; return; }
      try{
        msg.textContent = 'Logging in...';
        const res = await fetch('/api/login', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (!res.ok) {
          msg.textContent = json.error || ('Login failed: ' + res.statusText);
          return;
        }
        if (json.error) { msg.textContent = json.error; return; }
        localStorage.setItem('token', json.token);
        window.location = '/dashboard.html';
      }catch(err){
        msg.textContent = 'Network error: ' + (err.message || err);
      }
    });
  </script>
</body>
</html>
