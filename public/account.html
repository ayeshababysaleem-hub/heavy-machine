<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Account Settings</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/dashboard.html">Dashboard</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:800px;margin:0 auto">
      <div class="card">
        <h2 style="margin-top:0">Account Settings</h2>
        <div id="accountInfo">Loading...</div>
        <p style="margin-top:12px"><a href="/edit-account.html">Edit account</a></p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>
  </div>

  <script>
    async function loadAccount(){
      const token = localStorage.getItem('token');
        const r = await fetch('/api/me', { headers: { Authorization: 'Bearer '+token } });
        if (!r.ok) return document.getElementById('accountInfo').textContent = 'Failed to load';
        const u = await r.json();
        const parts = [];
        parts.push(`<strong>Name:</strong> ${u.name || ''}`);
        parts.push(`<strong>Email:</strong> ${u.email || ''}`);
        parts.push(`<strong>Role:</strong> ${u.role || ''}`);
        if (u.accountTitle) parts.push(`<strong>Account Title:</strong> ${u.accountTitle}`);
        if (u.jazzcashAccount) parts.push(`<strong>JazzCash:</strong> ${u.jazzcashAccount}`);
        if (u.easypaisaAccount) parts.push(`<strong>EasyPaisa:</strong> ${u.easypaisaAccount}`);
        document.getElementById('accountInfo').innerHTML = parts.join('<br>');
        const u = await res.json();
        document.getElementById('accountForm').innerHTML = `
          <p><strong>Name:</strong> ${u.name}</p>
          <p><strong>Email:</strong> ${u.email}</p>
          <p><strong>Role:</strong> ${u.role}</p>
          <p><a href="/edit-account.html">Edit account</a></p>
        `;
      }catch(e){ console.error(e); document.getElementById('accountForm').textContent = 'Network error'; }
    }
    loadAccount();
  </script>
</body>
</html>
