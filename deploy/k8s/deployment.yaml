apiVersion: apps/v1
kind: Deployment
metadata:
  name: heavy-machine-api
  labels:
    app: heavy-machine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heavy-machine
  template:
    metadata:
      labels:
        app: heavy-machine
    spec:
      containers:
        - name: api
          image: ghcr.io/<owner>/<repo>/heavy-machine:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: "<PROD_DB_SECRET_NAME>"    # replace with the secret name you create
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: "<PROD_DB_SECRET_NAME>"
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "<PROD_DB_SECRET_NAME>"
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "<PROD_DB_SECRET_NAME>"
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: "<PROD_DB_SECRET_NAME>"
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: "<PROD_JWT_SECRET_NAME>"   # replace with your JWT secret name
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /api/machines
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/machines
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10