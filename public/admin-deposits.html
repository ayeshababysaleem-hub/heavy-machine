<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Payments</title>
  <link rel="stylesheet" href="/style.css">
  <style>#navLogin{display:none !important}</style>
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <div class="brand"><img src="/images/logo.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px"/>HEAVY MACHINE</div>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/dashboard.html">Dashboard</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding:40px 20px;max-width:1400px;margin:0 auto">
      <div class="card">
        <h2 style="margin-top:0">Deposit Details</h2>
        <p>All payments and deposits received from bookings</p>
        
        <!-- Summary Cards -->
        <div style="margin-top:16px; display:flex; gap:20px; flex-wrap:wrap">
          <div style="flex:1; min-width:200px; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); padding:16px; border-radius:8px">
            <div style="color:var(--muted); font-size:0.85rem">Total Revenue</div>
            <div id="totalRevenue" style="font-size:1.8rem; font-weight:600; color:#10b981; margin-top:4px">₨ 0</div>
          </div>
          <div style="flex:1; min-width:200px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); padding:16px; border-radius:8px">
            <div style="color:var(--muted); font-size:0.85rem">Total Commission (10%)</div>
            <div id="totalCommission" style="font-size:1.8rem; font-weight:600; color:#ef4444; margin-top:4px">₨ 0</div>
          </div>
          <div style="flex:1; min-width:200px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.3); padding:16px; border-radius:8px">
            <div style="color:var(--muted); font-size:0.85rem">Net Paid to Owners</div>
            <div id="totalNet" style="font-size:1.8rem; font-weight:600; color:#3b82f6; margin-top:4px">₨ 0</div>
          </div>
          
          <div style="flex:1; min-width:200px; background:rgba(6,182,212,0.06); border:1px solid rgba(6,182,212,0.12); padding:16px; border-radius:8px">
            <div style="color:var(--muted); font-size:0.85rem">Total Security Deposits</div>
            <div id="totalDeposit" style="font-size:1.8rem; font-weight:600; color:#06b6d4; margin-top:4px">₨ 0</div>
          </div>

          <div style="flex:1; min-width:200px; background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.3); padding:16px; border-radius:8px">
            <div style="color:var(--muted); font-size:0.85rem">Total Bookings</div>
            <div id="totalBookings" style="font-size:1.8rem; font-weight:600; color:#fbbf24; margin-top:4px">0</div>
          </div>
        </div>

        <!-- Payments Table -->
        <div id="paymentsList" style="margin-top:24px"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 My Project</div>
    </footer>

    <!-- Modal for alerts -->
    <div id="alertModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;display:none">
      <div style="background:#0b1220;border-radius:14px;padding:24px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
        <h3 id="alertTitle" style="margin:0 0 12px 0;color:#e6eef8">Message</h3>
        <p id="alertMessage" style="margin:0 0 24px 0;color:#94a3b8;line-height:1.5">Message</p>
        <div style="display:flex;justify-content:flex-end">
          <button id="alertOk" style="padding:10px 24px;border-radius:8px;border:0;background:linear-gradient(90deg,#49a6ff,#2d8ff6);color:#fff;cursor:pointer;font-weight:600">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function formatPKR(n){ return '₨ ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function showAlert(title, message){
      return new Promise((resolve)=>{
        const modal = document.getElementById('alertModal');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const okBtn = document.getElementById('alertOk');
        titleEl.textContent = title;
        msgEl.textContent = message;
        modal.style.display = 'flex';
        const handle = ()=>{ modal.style.display='none'; okBtn.removeEventListener('click', handle); resolve(); };
        okBtn.addEventListener('click', handle);
      });
    }

    (async function(){
      const token = localStorage.getItem('token');
      if (!token) return await showAlert('Error', 'Not logged in');
      const payList = document.getElementById('paymentsList');
      // remove any stray text nodes that contain literal "false" within the card
      try{
        const card = (payList && payList.closest && payList.closest('.card')) || document.querySelector('.card') || document.body;
        if (card){
          const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, null);
          const toRemove = [];
          let n;
          while ((n = walker.nextNode())){
            if (n.nodeValue && n.nodeValue.trim() === 'false') toRemove.push(n);
          }
          toRemove.forEach(t => t.parentNode && t.parentNode.removeChild(t));
        }
      }catch(e){ /* ignore */ }
      
      try{
        const r = await fetch('/api/admin/payments', { headers: { Authorization: 'Bearer ' + token } });
        if (!r.ok){ 
          const err = await r.text().catch(()=>'');
          return payList.innerHTML = '<p>Failed to load payments (HTTP ' + r.status + '): ' + err + '</p>'; 
        }
        let data = {};
        try{
          data = await r.json();
        }catch(e){
          console.error('Failed to parse payments JSON:', e);
          return payList.innerHTML = '<p>Failed to parse payments data</p>';
        }
        const payments = data.data || [];

        if (payments.length === 0){ 
          payList.innerHTML = '<p>No payments found</p>'; 
          return; 
        }

        // Calculate totals
        let totalRevenue = 0;
        let totalCommission = 0;
        let totalNet = 0;
        let totalDeposit = 0;
        payments.forEach(p => {
          totalRevenue += Number(p.revenue) || 0;
          totalCommission += Number(p.commission) || 0;
          totalNet += Number(p.net) || 0;
          // support multiple possible field names for deposit
          totalDeposit += Number(p.securityDeposit || p.deposit || p.depositAmount) || 0;
        });

        // Update summary cards
        document.getElementById('totalRevenue').textContent = formatPKR(totalRevenue);
        document.getElementById('totalCommission').textContent = formatPKR(totalCommission);
        document.getElementById('totalNet').textContent = formatPKR(totalNet);
        // show total security deposit
        const depositEl = document.getElementById('totalDeposit'); if (depositEl) depositEl.textContent = formatPKR(totalDeposit);
        document.getElementById('totalBookings').textContent = payments.length;

        // Render payments table
        // make sure payList is cleared of any stray text/booleans
        payList.innerHTML = '';
        const table = document.createElement('table');
        table.style.width = '100%';
        table.style.borderCollapse = 'collapse';
        table.style.marginTop = '12px';
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr style="border-bottom:1px solid rgba(255,255,255,0.1)\">' +
          '<th style="text-align:left;padding:12px">Machine</th>' +
          '<th style="text-align:left;padding:12px">Customer</th>' +
          '<th style="text-align:left;padding:12px">Booking Period</th>' +
          '<th style="text-align:right;padding:12px">Total Revenue</th>' +
          '<th style="text-align:right;padding:12px">Admin Commission</th>' +
          '<th style="text-align:right;padding:12px">Net Earnings</th>' +
        '</tr>';
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        payments.forEach(p => {
          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid rgba(255,255,255,0.02)';
          tr.innerHTML = `
            <td style="padding:12px"><strong>${p.machineName || p.machineId || 'Unknown'}</strong></td>
            <td style="padding:12px">${p.customerName || p.customerEmail || '—'}</td>
            <td style="padding:12px">${p.startDate || '—'} → ${p.endDate || '—'}</td>
            <td style="padding:12px;text-align:right;color:#10b981;font-weight:600">${formatPKR(p.revenue || p.totalRevenue || p.amount || 0)}</td>
            <td style="padding:12px;text-align:right;color:#ef4444">${formatPKR(p.commission || 0)}</td>
            <td style="padding:12px;text-align:right;color:#3b82f6;font-weight:600">${formatPKR(p.net || p.ownerNet || 0)}</td>
          `;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        payList.appendChild(table);
        // final cleanup: remove any text nodes that might contain literal 'false'
        try{
          const card = (payList && payList.closest && payList.closest('.card')) || document.querySelector('.card') || document.body;
          if (card){
            const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, null);
            const toRemove = [];
            let n;
            while ((n = walker.nextNode())){
              if (n.nodeValue && n.nodeValue.trim() === 'false') toRemove.push(n);
            }
            toRemove.forEach(t => t.parentNode && t.parentNode.removeChild(t));
          }
        }catch(e){ /* ignore */ }
        
      }catch(err){ 
        console.error('Error:', err); 
        payList.innerHTML = '<p style="color:#ef4444">Error: ' + (err.message || 'Unknown error') + '</p>'; 
      }
    })();
  </script>
</body>
</html>
